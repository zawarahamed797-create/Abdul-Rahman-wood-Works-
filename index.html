<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abdul Rahman Wood Works</title>

<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5;}
header{background:#111;color:#fff;padding:15px;text-align:center;}
section{padding:40px;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;}
img{width:100%;height:200px;object-fit:cover;border-radius:10px;}
button{padding:10px 20px;background:#111;color:#fff;border:none;margin:5px;cursor:pointer;}
input{padding:10px;margin:10px;}
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25d366;padding:15px;border-radius:50%;}
.admin{display:none;background:#fff;padding:20px;margin:20px;}
</style>

</head>

<body>

<header>
<h2>Abdul Rahman Wood Works</h2>
</header>

<section>
<h1>Luxury Woodwork</h1>
<p>Kitchen | Wardrobe | Furniture Experts</p>
<button onclick="sendWhatsApp()">Get Quote</button>
</section>

<!-- PORTFOLIO -->
<section>
<h2>Our Work</h2>
<div id="gallery" class="grid"></div>
</section>

<!-- CONTACT -->
<section>
<h2>Contact</h2>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<button onclick="sendWhatsApp()">Send</button>
</section>

<!-- ADMIN LOGIN -->
<section>
<h3>Admin Login</h3>
<input id="pass" type="password" placeholder="Enter Password">
<button onclick="login()">Login</button>
</section>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin">
<h2>Upload Work</h2>
<input type="file" onchange="addImage(event)">
<button onclick="clearGallery()">Delete All</button>
</div>

<div class="whatsapp" onclick="sendWhatsApp()">💬</div>

<script>

/* LOAD SAVED IMAGES */
let gallery=document.getElementById("gallery");

function loadImages(){
let images=JSON.parse(localStorage.getItem("images")||"[]");
gallery.innerHTML="";
images.forEach((src,i)=>{
gallery.innerHTML+=`
<div>
<img src="${src}">
<button onclick="deleteImage(${i})">Delete</button>
</div>`;
});
}

loadImages();

/* ADD IMAGE */
function addImage(event){
let reader=new FileReader();
reader.onload=function(){
let images=JSON.parse(localStorage.getItem("images")||"[]");
images.push(reader.result);
localStorage.setItem("images",JSON.stringify(images));
loadImages();
}
reader.readAsDataURL(event.target.files[0]);
}

/* DELETE SINGLE */
function deleteImage(index){
let images=JSON.parse(localStorage.getItem("images")||"[]");
images.splice(index,1);
localStorage.setItem("images",JSON.stringify(images));
loadImages();
}

/* DELETE ALL */
function clearGallery(){
localStorage.removeItem("images");
loadImages();
}

/* ADMIN LOGIN */
function login(){
let pass=document.getElementById("pass").value;
if(pass==="1234"){
document.getElementById("adminPanel").style.display="block";
alert("Login Success");
}else{
alert("Wrong Password");
}
}

/* WHATSAPP */
function sendWhatsApp(){
let name=document.getElementById("name").value || "";
let phone=document.getElementById("phone").value || "";
let text=`Name: ${name}%0APhone: ${phone}`;
window.open(`https://wa.me/923187196942?text=${text}`);
}

</script>

</body>
</html>
